<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Bajas DEACERO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
  .topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10;}
  .logo-dot{width:10px;height:10px;border-radius:50%;background:#D85A30;}
  .topbar-title{font-size:15px;font-weight:500;color:#1a1a1a;margin-left:12px;}
  .topbar-left{display:flex;align-items:center;}
  .file-badge{display:flex;align-items:center;gap:8px;font-size:12px;color:#666;background:#f0efeb;border-radius:8px;padding:5px 12px;}
  .file-badge svg{width:14px;height:14px;color:#1D9E75;flex-shrink:0;}
  .btn-cambiar{font-size:11px;color:#888;background:none;border:none;cursor:pointer;text-decoration:underline;margin-left:4px;}
  .drop-zone{border:2px dashed #d0cfc9;border-radius:16px;background:#fff;padding:3rem 2rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:1.5rem;}
  .drop-zone:hover,.drop-zone.drag-over{border-color:#534AB7;background:#f4f3fe;}
  .drop-zone svg{width:40px;height:40px;color:#aaa;margin:0 auto 12px;display:block;}
  .drop-zone p{font-size:14px;color:#666;margin-bottom:6px;}
  .drop-zone span{font-size:12px;color:#aaa;}
  .main{padding:1.5rem 2rem 3rem;max-width:1100px;margin:0 auto;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
  .filters label{font-size:12px;color:#888;}
  .filters select{font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid #e0e0da;background:#fff;color:#1a1a1a;cursor:pointer;}
  .kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;}
  .kpi{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:.875rem 1.125rem;}
  .kpi-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
  .kpi-val{font-size:28px;font-weight:500;color:#1a1a1a;letter-spacing:-0.02em;line-height:1;}
  .kpi-sub{font-size:11px;color:#aaa;margin-top:4px;}
  .kpi-accent{border-top:3px solid #D85A30;}
  .kpi-accent2{border-top:3px solid #1D9E75;}
  .kpi-accent3{border-top:3px solid #534AB7;}
  .charts-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:12px;}
  .chart-card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1.125rem;cursor:pointer;transition:border-color .15s;}
  .chart-card:hover{border-color:#534AB7;}
  .chart-card.clickable-hint::after{content:'Haz clic en la gráfica para ver el detalle';display:block;font-size:10px;color:#bbb;margin-top:6px;text-align:right;}
  .chart-label{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;font-size:11px;color:#666;}
  .legend span{display:flex;align-items:center;gap:5px;}
  .legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
  .bar-list{display:grid;gap:6px;}
  .bar-row{display:flex;align-items:center;gap:8px;cursor:pointer;border-radius:6px;padding:2px 4px;transition:background .12s;}
  .bar-row:hover{background:#f0efeb;}
  .bar-name{color:#666;min-width:155px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-wrap{flex:1;background:#f0efeb;border-radius:4px;height:9px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;transition:width .3s;}
  .bar-count{font-size:11px;color:#aaa;min-width:22px;text-align:right;}
  .nb-wrap{display:grid;grid-template-columns:auto 1fr;gap:6px;}
  .nb-axis-y{display:flex;flex-direction:column;justify-content:space-around;font-size:9px;color:#aaa;text-align:right;padding-bottom:20px;}
  .nb-right{display:flex;flex-direction:column;gap:3px;}
  .nb-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,52px);gap:3px;}
  .nb-cell{border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px;cursor:pointer;transition:opacity .15s;}
  .nb-cell:hover{opacity:.8;}
  .nb-cell-count{font-size:18px;font-weight:500;}
  .nb-cell-label{font-size:8px;text-align:center;line-height:1.2;opacity:.8;}
  .nb-axis-x{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
  .nb-axis-x span{font-size:9px;color:#aaa;text-align:center;}

  /* Tabla de detalle */
  .detalle-card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;margin-bottom:12px;overflow:hidden;transition:box-shadow .2s;}
  .detalle-card.highlight{box-shadow:0 0 0 2px #534AB7;}
  .detalle-header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.125rem;border-bottom:1px solid #f0efeb;flex-wrap:wrap;gap:8px;}
  .detalle-title{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.05em;}
  .detalle-filtro{font-size:12px;color:#534AB7;font-weight:500;background:#EEEDFE;border-radius:6px;padding:2px 10px;display:none;}
  .detalle-filtro.visible{display:inline-block;}
  .btn-limpiar{font-size:11px;color:#888;background:none;border:1px solid #e0e0da;border-radius:6px;padding:2px 8px;cursor:pointer;}
  .btn-limpiar:hover{background:#f5f5f3;}
  .detalle-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .detalle-count{font-size:11px;color:#aaa;}
  .detalle-search{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid #e0e0da;background:#f5f5f3;color:#1a1a1a;width:180px;}
  .tabla-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead th{text-align:left;padding:8px 12px;font-size:10px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #f0efeb;white-space:nowrap;background:#fafaf8;}
  tbody td{padding:9px 12px;border-bottom:1px solid #f7f7f5;color:#333;vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:#fafaf8;}
  .tag{display:inline-block;font-size:10px;border-radius:4px;padding:2px 7px;font-weight:500;}
  .tag-Forzada{background:#FCEBEB;color:#791F1F;}
  .tag-Voluntaria{background:#EAF3DE;color:#27500A;}
  .tag-Jubilación,.tag-Jubilacion{background:#EEEDFE;color:#3C3489;}
  .pagination{display:flex;align-items:center;justify-content:space-between;padding:.625rem 1.125rem;border-top:1px solid #f0efeb;font-size:12px;color:#aaa;}
  .pag-btns{display:flex;gap:4px;}
  .pag-btn{padding:3px 10px;border-radius:6px;border:1px solid #e0e0da;background:#fff;cursor:pointer;font-size:11px;color:#555;}
  .pag-btn:hover{background:#f5f5f3;}
  .pag-btn:disabled{opacity:.35;cursor:default;}
  .empty-table{text-align:center;padding:2rem;color:#bbb;font-size:13px;}
  @media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr);}.charts-row{grid-template-columns:1fr;}.main{padding:1rem;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-dot"></div>
    <span class="topbar-title">Dashboard Bajas DEACERO</span>
  </div>
  <div id="file-badge-wrap"></div>
</div>

<div class="main">
  <div id="drop-area">
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      <p>Arrastra tu Excel aquí o haz clic para seleccionarlo</p>
      <span>Archivo .xlsx de bajas DEACERO — hoja "Bajas"</span>
      <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none" onchange="leerArchivo(this.files[0])">
    </div>
  </div>

  <div class="filters" id="filters-bar" style="display:none;">
    <label>Filtrar:</label>
    <select id="f-anio"  onchange="render()"><option value="">Todos los años</option></select>
    <select id="f-tipo"  onchange="render()"><option value="">Todos los tipos</option></select>
    <select id="f-dir"   onchange="render()"><option value="">Todas las direcciones</option></select>
    <select id="f-nivel" onchange="render()"><option value="">Todos los niveles</option></select>
  </div>

  <div class="kpis" id="kpis" style="display:none;">
    <div class="kpi kpi-accent"><div class="kpi-label">Total bajas</div><div class="kpi-val" id="k-total">—</div><div class="kpi-sub" id="k-rango">—</div></div>
    <div class="kpi kpi-accent2"><div class="kpi-label">Voluntarias</div><div class="kpi-val" id="k-vol">—</div><div class="kpi-sub" id="k-pct-vol">—</div></div>
    <div class="kpi kpi-accent"><div class="kpi-label">Forzadas</div><div class="kpi-val" id="k-for">—</div><div class="kpi-sub" id="k-pct-for">—</div></div>
    <div class="kpi kpi-accent3"><div class="kpi-label">Jubilaciones</div><div class="kpi-val" id="k-jub">—</div><div class="kpi-sub" id="k-pct-jub">—</div></div>
  </div>

  <div id="charts-area"></div>
</div>

<script>
const MES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const COLORS={'Forzada':'#D85A30','Voluntaria':'#1D9E75','Jubilación':'#534AB7','Jubilacion':'#534AB7','Empleado':'#378ADD','Gerente':'#D85A30','Subdirector':'#534AB7','Director':'#639922'};
// Matriz DEACERO — orden visual de la cuadrícula (fila por fila, de arriba a abajo)
// Fila 1 (Excede Competencias): 4, 7, 9
// Fila 2 (Cumple Competencias): 2, 5, 8
// Fila 3 (Requiere Competencias): 1, 3, 6
const NB_CELLS=[
  // Fila 1 — Excede Expectativas (competencias)
  {pot:0,des:0,num:4,label:'4 Talento\nEmergente\nCompetencias',bg:'#F5C518',tc:'#5a3e00'},
  {pot:0,des:1,num:7,label:'7 Top Talent\nCompetencias',bg:'#2ECC40',tc:'#0a3d0a'},
  {pot:0,des:2,num:9,label:'9 Top\nTalent',bg:'#1a7a1a',tc:'#ffffff'},
  // Fila 2 — Cumple Expectativas (competencias)
  {pot:1,des:0,num:2,label:'2 Requiere\nMejora\nDesempeño',bg:'#F5C518',tc:'#5a3e00'},
  {pot:1,des:1,num:5,label:'5 Talento\nSólido',bg:'#2196F3',tc:'#ffffff'},
  {pot:1,des:2,num:8,label:'8 Top Talent\nDesempeño',bg:'#2ECC40',tc:'#0a3d0a'},
  // Fila 3 — Requiere Mejora (competencias)
  {pot:2,des:0,num:1,label:'1 Low\nPerformer',bg:'#E53935',tc:'#ffffff'},
  {pot:2,des:1,num:3,label:'3 Requiere\nMejora\nCompetencias',bg:'#F5C518',tc:'#5a3e00'},
  {pot:2,des:2,num:6,label:'6 Talento\nEmergente\nDesempeño',bg:'#F5C518',tc:'#5a3e00'},
];

let DATA=[],charts={},fileName='';
let paginaActual=1,porPagina=15,busqueda='';
let detalleFilter=null; // {label, fn} — filtro activo del click en gráfica

function excelDateToJS(v){
  if(typeof v==='number') return new Date(Math.round((v-25569)*86400*1000));
  if(typeof v==='string'){
    if(v.includes('/')) {const[d,m,y]=v.split('/');return new Date(+y,+m-1,+d);}
    if(v.includes('-')) {const p=v.split('-');return p[0].length===4?new Date(+p[0],+p[1]-1,+p[2]):new Date(+p[2],+p[1]-1,+p[0]);}
  }
  return null;
}
function formatDate(dt){if(!dt)return'—';return dt.getDate().toString().padStart(2,'0')+'/'+(dt.getMonth()+1).toString().padStart(2,'0')+'/'+dt.getFullYear();}
function getYear(r){return r._date?r._date.getFullYear():null;}
function getMonthKey(r){return r._date?r._date.getFullYear()+'-'+(r._date.getMonth()+1):null;}
function getMonthLabel(k){const[y,m]=k.split('-');return MES[+m-1]+' '+y.slice(2);}

function normalizeNB(raw){
  const r=(raw||'').toString().toLowerCase().trim();
  if(!r||r==='na'||r==='sin información'||r==='sin informacion'||r===''||r==='-') return null;
  // Detectar por número al inicio del string
  const num=parseInt(r);
  if(!isNaN(num)&&num>=1&&num<=9){
    const map={1:{pot:2,des:0},2:{pot:1,des:0},3:{pot:2,des:1},4:{pot:0,des:0},5:{pot:1,des:1},6:{pot:2,des:2},7:{pot:0,des:1},8:{pot:1,des:2},9:{pot:0,des:2}};
    return map[num]||null;
  }
  // Detectar por nombre
  if(r.includes('low performer')) return{pot:2,des:0};
  if(r.includes('talento sólido')||r.includes('talento solido')) return{pot:1,des:1};
  if(r.includes('top talent')&&r.includes('competencia')) return{pot:0,des:1};
  if(r.includes('top talent')&&r.includes('desempeño')) return{pot:1,des:2};
  if(r.includes('top talent')) return{pot:0,des:2};
  if(r.includes('talento emergente')&&r.includes('competencia')) return{pot:0,des:0};
  if(r.includes('talento emergente')&&r.includes('desempeño')) return{pot:2,des:2};
  if(r.includes('requiere mejora')&&r.includes('desempeño')) return{pot:1,des:0};
  if(r.includes('requiere mejora')&&r.includes('competencia')) return{pot:2,des:1};
  if(r.includes('requiere mejora')) return{pot:2,des:0};
  return null;
}

function leerArchivo(file){
  if(!file)return;
  fileName=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'array'});
    const sheetName=wb.SheetNames.find(n=>n.toLowerCase().includes('baja'))||wb.SheetNames[0];
    const ws=wb.Sheets[sheetName];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    DATA=rows.map(r=>({
      nombre:(r['Nombre Completo']||r['Nombre']||'')+'',
      _date:excelDateToJS(r['Fecha de Baja']||r['Fecha Baja']||r['Fecha']||''),
      tipo:(r['Tipo de Baja']||r['Tipo Baja']||r['Tipo']||'').toString().trim(),
      dir:(r['Dirección']||r['Direccion']||'').toString().trim(),
      nivel:(r['Nivel Organizacional']||r['Nivel']||'').toString().trim(),
      motivo:(r['Motivo de baja']||r['Motivo']||'').toString().trim(),
      nb:(r['9box']||r['9Box']||r['9-box']||'').toString().trim(),
      tab:(r['% tabulador']||r['% Tabulador']||r['tabulador']||'').toString().trim(),
    })).filter(r=>r.nombre&&r.nombre!=='undefined');
    mostrarDashboard();
  };
  reader.readAsArrayBuffer(file);
}

function mostrarDashboard(){
  document.getElementById('drop-area').style.display='none';
  document.getElementById('filters-bar').style.display='flex';
  document.getElementById('kpis').style.display='grid';
  document.getElementById('file-badge-wrap').innerHTML=`<div class="file-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>${fileName}<button class="btn-cambiar" onclick="cambiarArchivo()">Cambiar archivo</button></div>`;
  initFilters();buildCharts();render();
}

function cambiarArchivo(){
  document.getElementById('drop-area').style.display='block';
  document.getElementById('filters-bar').style.display='none';
  document.getElementById('kpis').style.display='none';
  document.getElementById('charts-area').innerHTML='';
  document.getElementById('file-badge-wrap').innerHTML='';
  destroyAll();DATA=[];detalleFilter=null;
}

function initFilters(){
  const years=[...new Set(DATA.map(getYear).filter(Boolean))].sort();
  const tipos=[...new Set(DATA.map(r=>r.tipo).filter(Boolean))].sort();
  const dirs=[...new Set(DATA.map(r=>r.dir).filter(Boolean))].sort();
  const niveles=[...new Set(DATA.map(r=>r.nivel).filter(Boolean))].sort();
  function fill(id,vals){const el=document.getElementById(id);el.innerHTML=el.options[0].outerHTML;vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o);});}
  fill('f-anio',years);fill('f-tipo',tipos);fill('f-dir',dirs);fill('f-nivel',niveles);
}

function buildCharts(){
  document.getElementById('charts-area').innerHTML=`
    <div class="charts-row">
      <div class="chart-card clickable-hint" style="grid-column:1/-1;"><div class="chart-label">Bajas por mes</div><div style="position:relative;width:100%;height:200px;"><canvas id="c-mes"></canvas></div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card clickable-hint"><div class="chart-label">Tipo de baja</div><div id="leg-tipo" class="legend"></div><div style="position:relative;width:100%;height:170px;"><canvas id="c-tipo"></canvas></div></div>
      <div class="chart-card clickable-hint"><div class="chart-label">Por nivel organizacional</div><div id="leg-nivel" class="legend"></div><div style="position:relative;width:100%;height:170px;"><canvas id="c-nivel"></canvas></div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card"><div class="chart-label">Top direcciones</div><div class="bar-list" id="dir-list"></div></div>
      <div class="chart-card"><div class="chart-label">Top motivos de baja</div><div class="bar-list" id="motivo-list"></div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card clickable-hint"><div class="chart-label">9-Box — distribución de bajas</div><div id="nb-container"></div></div>
      <div class="chart-card clickable-hint"><div class="chart-label">Tendencia mensual por tipo</div><div id="leg-acum" class="legend"></div><div style="position:relative;width:100%;height:200px;"><canvas id="c-acum"></canvas></div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card" style="grid-column:1/-1;"><div class="chart-label">% Penetración en tabulador</div><div id="tab-container"></div></div>
    </div>
    <div class="detalle-card" id="detalle-card">
      <div class="detalle-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span class="detalle-title">Detalle</span>
          <span class="detalle-filtro" id="detalle-filtro-badge"></span>
          <button class="btn-limpiar" id="btn-limpiar" style="display:none;" onclick="limpiarDetalle()">✕ Limpiar</button>
        </div>
        <div class="detalle-right">
          <span class="detalle-count" id="detalle-count"></span>
          <input class="detalle-search" type="text" placeholder="Buscar nombre…" oninput="buscar(this.value)">
        </div>
      </div>
      <div class="tabla-wrap"><table>
        <thead><tr><th style="min-width:180px;">Nombre</th><th>Fecha de baja</th><th>Tipo</th><th style="min-width:140px;">Dirección</th><th>Nivel</th><th>Motivo</th></tr></thead>
        <tbody id="tabla-body"></tbody>
      </table></div>
      <div class="pagination">
        <span id="pag-info"></span>
        <div class="pag-btns">
          <button class="pag-btn" id="btn-prev" onclick="cambiarPagina(-1)">← Anterior</button>
          <button class="pag-btn" id="btn-next" onclick="cambiarPagina(1)">Siguiente →</button>
        </div>
      </div>
    </div>`;
}

function getFiltered(){
  const anio=document.getElementById('f-anio').value;
  const tipo=document.getElementById('f-tipo').value;
  const dir=document.getElementById('f-dir').value;
  const nivel=document.getElementById('f-nivel').value;
  return DATA.filter(r=>{
    if(anio&&getYear(r)!=+anio)return false;
    if(tipo&&r.tipo!==tipo)return false;
    if(dir&&r.dir!==dir)return false;
    if(nivel&&r.nivel!==nivel)return false;
    return true;
  });
}

function activarDetalle(label, filterFn){
  detalleFilter={label,fn:filterFn};
  paginaActual=1;busqueda='';
  const sInput=document.querySelector('.detalle-search');
  if(sInput)sInput.value='';
  const badge=document.getElementById('detalle-filtro-badge');
  if(badge){badge.textContent='📌 '+label;badge.classList.add('visible');}
  const btnL=document.getElementById('btn-limpiar');
  if(btnL)btnL.style.display='inline-block';
  // Re-renderizar TODAS las gráficas con el subconjunto
  renderConFiltro(getFiltered().filter(filterFn));
}

function limpiarDetalle(){
  detalleFilter=null;paginaActual=1;busqueda='';
  const sInput=document.querySelector('.detalle-search');
  if(sInput)sInput.value='';
  const badge=document.getElementById('detalle-filtro-badge');
  if(badge){badge.textContent='';badge.classList.remove('visible');}
  const btnL=document.getElementById('btn-limpiar');
  if(btnL)btnL.style.display='none';
  renderConFiltro(getFiltered());
}

function buscar(val){busqueda=val.toLowerCase();paginaActual=1;renderTabla(getFiltered());}
function cambiarPagina(dir){
  const base=detalleFilter?getFiltered().filter(detalleFilter.fn):getFiltered();
  const filtered=base.filter(r=>!busqueda||r.nombre.toLowerCase().includes(busqueda));
  const totalPags=Math.max(1,Math.ceil(filtered.length/porPagina));
  paginaActual=Math.max(1,Math.min(paginaActual+dir,totalPags));
  renderTabla(getFiltered());
}

function renderTabla(data){
  if(!document.getElementById('tabla-body'))return;
  let base=detalleFilter?data.filter(detalleFilter.fn):data;
  const filtrados=base.filter(r=>!busqueda||r.nombre.toLowerCase().includes(busqueda));
  const total=filtrados.length;
  const totalPags=Math.max(1,Math.ceil(total/porPagina));
  paginaActual=Math.min(paginaActual,totalPags);
  const inicio=(paginaActual-1)*porPagina;
  const pagina=filtrados.slice(inicio,inicio+porPagina);
  document.getElementById('detalle-count').textContent=total+' registros';
  document.getElementById('pag-info').textContent='Página '+paginaActual+' de '+totalPags;
  document.getElementById('btn-prev').disabled=paginaActual<=1;
  document.getElementById('btn-next').disabled=paginaActual>=totalPags;
  const tagC=t=>'tag-'+(t==='Jubilación'||t==='Jubilacion'?'Jubilación':t);
  document.getElementById('tabla-body').innerHTML=pagina.length?pagina.map(r=>`<tr>
    <td style="font-weight:500;">${r.nombre||'—'}</td>
    <td>${formatDate(r._date)}</td>
    <td><span class="tag ${tagC(r.tipo)}">${r.tipo||'—'}</span></td>
    <td>${r.dir||'—'}</td>
    <td>${r.nivel||'—'}</td>
    <td style="color:#888;font-size:11px;">${r.motivo||'—'}</td>
  </tr>`).join(''):`<tr><td colspan="6" class="empty-table">Sin registros para esta selección</td></tr>`;
}

function count(arr,key){const m={};arr.forEach(r=>{const v=r[key]||'Sin dato';m[v]=(m[v]||0)+1;});return m;}
function destroyAll(){Object.values(charts).forEach(c=>c.destroy());charts={};}

function render(){
  if(!document.getElementById('c-mes'))return;
  detalleFilter=null;
  const badge=document.getElementById('detalle-filtro-badge');
  if(badge){badge.textContent='';badge.classList.remove('visible');}
  const btnL=document.getElementById('btn-limpiar');
  if(btnL)btnL.style.display='none';
  paginaActual=1;busqueda='';
  const sInput=document.querySelector('.detalle-search');
  if(sInput)sInput.value='';
  renderConFiltro(getFiltered());
}

function renderConFiltro(data){
  if(!document.getElementById('c-mes'))return;
  destroyAll();
  const n=data.length;
  const forzadas=data.filter(r=>r.tipo==='Forzada').length;
  const voluntarias=data.filter(r=>r.tipo==='Voluntaria').length;
  const jubs=data.filter(r=>r.tipo==='Jubilación'||r.tipo==='Jubilacion').length;

  document.getElementById('k-total').textContent=n;
  document.getElementById('k-rango').textContent=n+' registros';
  document.getElementById('k-vol').textContent=voluntarias;
  document.getElementById('k-pct-vol').textContent=n?Math.round(voluntarias/n*100)+'% del total':'—';
  document.getElementById('k-for').textContent=forzadas;
  document.getElementById('k-pct-for').textContent=n?Math.round(forzadas/n*100)+'% del total':'—';
  document.getElementById('k-jub').textContent=jubs;
  document.getElementById('k-pct-jub').textContent=n?Math.round(jubs/n*100)+'% del total':'—';

  const byMonth={};
  data.forEach(r=>{const k=getMonthKey(r);if(k){byMonth[k]=(byMonth[k]||0)+1;}});
  const sortedMonths=Object.keys(byMonth).sort();
  const mesLabels=sortedMonths.map(k=>getMonthLabel(k));

  charts.mes=new Chart(document.getElementById('c-mes'),{
    type:'bar',
    data:{labels:mesLabels,datasets:[{label:'Bajas',data:sortedMonths.map(k=>byMonth[k]),backgroundColor:'#534AB7',borderRadius:3,hoverBackgroundColor:'#3C3489'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:45,autoSkip:false}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}},
      onClick:(e,els)=>{
        if(!els.length)return;
        const monthKey=sortedMonths[els[0].index];
        const label='Mes: '+getMonthLabel(monthKey);
        activarDetalle(label,r=>getMonthKey(r)===monthKey);
      }
    }
  });

  const tipoMap=count(data,'tipo'),tipoKeys=Object.keys(tipoMap);
  document.getElementById('leg-tipo').innerHTML=tipoKeys.map(k=>`<span><span class="legend-dot" style="background:${COLORS[k]||'#888'}"></span>${k}: ${tipoMap[k]}</span>`).join('');
  charts.tipo=new Chart(document.getElementById('c-tipo'),{
    type:'doughnut',
    data:{labels:tipoKeys,datasets:[{data:tipoKeys.map(k=>tipoMap[k]),backgroundColor:tipoKeys.map(k=>COLORS[k]||'#888'),borderWidth:0,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      onClick:(e,els)=>{
        if(!els.length)return;
        const t=tipoKeys[els[0].index];
        activarDetalle('Tipo: '+t,r=>r.tipo===t||(t==='Jubilación'&&r.tipo==='Jubilacion'));
      }
    }
  });

  const nivelMap=count(data,'nivel'),nivelKeys=Object.keys(nivelMap).sort((a,b)=>nivelMap[b]-nivelMap[a]);
  document.getElementById('leg-nivel').innerHTML=nivelKeys.map(k=>`<span><span class="legend-dot" style="background:${COLORS[k]||'#888'}"></span>${k}</span>`).join('');
  charts.nivel=new Chart(document.getElementById('c-nivel'),{
    type:'bar',
    data:{labels:nivelKeys,datasets:[{data:nivelKeys.map(k=>nivelMap[k]),backgroundColor:nivelKeys.map(k=>COLORS[k]||'#888'),borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}},
      onClick:(e,els)=>{
        if(!els.length)return;
        const nv=nivelKeys[els[0].index];
        activarDetalle('Nivel: '+nv,r=>r.nivel===nv);
      }
    }
  });

  const dirMap=count(data,'dir'),topDirs=Object.entries(dirMap).sort((a,b)=>b[1]-a[1]).slice(0,8),maxDir=topDirs[0]?topDirs[0][1]:1;
  document.getElementById('dir-list').innerHTML=topDirs.map(([k,v])=>`
    <div class="bar-row" onclick="activarDetalle('Dir: ${k.replace(/'/g,"\\'")}',r=>r.dir===${JSON.stringify(k)})">
      <span class="bar-name" title="${k}">${k}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxDir*100)}%;background:#534AB7;"></div></div>
      <span class="bar-count">${v}</span>
    </div>`).join('');

  const motMap={};
  data.forEach(r=>{const m=(r.motivo||'').trim();if(m&&m!=='NA'&&m!=='Sin información'&&m!==''){motMap[m]=(motMap[m]||0)+1;}});
  const topMot=Object.entries(motMap).sort((a,b)=>b[1]-a[1]).slice(0,8),maxMot=topMot[0]?topMot[0][1]:1;
  document.getElementById('motivo-list').innerHTML=topMot.map(([k,v])=>`
    <div class="bar-row" onclick="activarDetalle('Motivo: ${k.replace(/'/g,"\\'")}',r=>r.motivo===${JSON.stringify(k)})">
      <span class="bar-name" title="${k}">${k}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxMot*100)}%;background:#1D9E75;"></div></div>
      <span class="bar-count">${v}</span>
    </div>`).join('');

  const nbCounts=Array.from({length:3},()=>Array(3).fill(0));let nbTotal=0;
  data.forEach(r=>{const p=normalizeNB(r.nb);if(p){nbCounts[p.pot][p.des]++;nbTotal++;}});
  document.getElementById('nb-container').innerHTML=`
    <div style="font-size:10px;color:#aaa;margin-bottom:6px;">Competencias ↑ · Desempeño → · <strong style="color:#666;">${nbTotal}</strong> de ${n} con dato 9-box</div>
    <div class="nb-wrap">
      <div class="nb-axis-y"><span>Excede</span><span>Cumple</span><span>Requiere</span></div>
      <div class="nb-right">
        <div class="nb-grid">${NB_CELLS.map(c=>{
          const cnt=nbCounts[c.pot][c.des];
          const pot=c.pot,des=c.des;
          return`<div class="nb-cell" style="background:${c.bg};" onclick="activarDetalle('9-Box: ${c.label.replace('\n',' ')}',r=>{const p=normalizeNB(r.nb);return p&&p.pot===${pot}&&p.des===${des};})">
            <span class="nb-cell-count" style="color:${c.tc};">${cnt}</span>
            <span class="nb-cell-label" style="color:${c.tc};">${c.label.replace('\n','<br>')}</span>
          </div>`;
        }).join('')}</div>
        <div class="nb-axis-x"><span>Requiere Mejora<br><small style="font-size:8px;">0–79</small></span><span>Cumple Expectativas<br><small style="font-size:8px;">80–100</small></span><span>Excede Expectativas<br><small style="font-size:8px;">101–120</small></span></div>
      </div>
    </div>`;

  const tiposAcum=['Forzada','Voluntaria','Jubilación'],coloresAcum=['#D85A30','#1D9E75','#534AB7'];
  document.getElementById('leg-acum').innerHTML=tiposAcum.map((t,i)=>`<span><span class="legend-dot" style="background:${coloresAcum[i]}"></span>${t}</span>`).join('');
  charts.acum=new Chart(document.getElementById('c-acum'),{
    type:'line',
    data:{labels:mesLabels,datasets:tiposAcum.map((t,i)=>({label:t,data:sortedMonths.map(k=>data.filter(r=>(r.tipo===t||(t==='Jubilación'&&r.tipo==='Jubilacion'))&&getMonthKey(r)===k).length),borderColor:coloresAcum[i],backgroundColor:coloresAcum[i]+'22',fill:false,tension:.3,pointRadius:4,borderWidth:2,pointHoverRadius:6}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:45,autoSkip:false}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}},
      onClick:(e,els)=>{
        if(!els.length)return;
        const ds=charts.acum.data.datasets[els[0].datasetIndex];
        const monthKey=sortedMonths[els[0].index];
        const t=ds.label;
        activarDetalle(t+' — '+getMonthLabel(monthKey),r=>(r.tipo===t||(t==='Jubilación'&&r.tipo==='Jubilacion'))&&getMonthKey(r)===monthKey);
      }
    }
  });

  // % Tabulador histogram
  const tabRanges=[{label:'0–50%',min:0,max:50},{label:'51–75%',min:51,max:75},{label:'76–100%',min:76,max:100},{label:'101–125%',min:101,max:125},{label:'126%+',min:126,max:999}];
  const tabData=data.map(r=>parseFloat((r.tab||'').toString().replace('%','').trim())).filter(v=>!isNaN(v)&&v>0);
  if(tabData.length===0){
    document.getElementById('tab-container').innerHTML='<div style="text-align:center;padding:2rem;color:#bbb;font-size:13px;">Sin datos de % tabulador aún — se mostrará cuando agregues esta columna a tu Excel.</div>';
  } else {
    const rangeCounts=tabRanges.map(r=>tabData.filter(v=>v>=r.min&&v<=r.max).length);
    document.getElementById('tab-container').innerHTML='<div style="position:relative;width:100%;height:200px;"><canvas id="c-tab"></canvas></div>';
    charts.tab=new Chart(document.getElementById('c-tab'),{
      type:'bar',
      data:{labels:tabRanges.map(r=>r.label),datasets:[{label:'Colaboradores',data:rangeCounts,backgroundColor:['#FCEBEB','#FAEEDA','#EAF3DE','#E1F5EE','#EEEDFE'],borderColor:['#D85A30','#BA7517','#1D9E75','#085041','#534AB7'],borderWidth:1.5,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}},
        onClick:(e,els)=>{
          if(!els.length)return;
          const rng=tabRanges[els[0].index];
          activarDetalle('Tabulador: '+rng.label,r=>{const v=parseFloat((r.tab||'').toString().replace('%','').trim());return!isNaN(v)&&v>=rng.min&&v<=rng.max;});
        }
      }
    });
  }

  renderTabla(data);
}

const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)leerArchivo(f);});
</script>
</body>
