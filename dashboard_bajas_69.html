function excelDateToJS(v){
  if(typeof v==='number'){
    // Usar UTC para evitar desfase por zona horaria
    const ms=Math.round((v-25569)*86400*1000);
    const d=new Date(ms);
    return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate());
  }
  if(typeof v==='string'){
    if(v.includes('/')) {const[d,m,y]=v.split('/');return new Date(+y,+m-1,+d);}
    if(v.includes('-')) {const p=v.split('-');return p[0].length===4?new Date(+p[0],+p[1]-1,+p[2]):new Date(+p[2],+p[1]-1,+p[0]);}
  }
  return null;
}
function formatDate(dt){if(!dt)return'—';return dt.getDate().toString().padStart(2,'0')+'/'+(dt.getMonth()+1).toString().padStart(2,'0')+'/'+dt.getFullYear();}
function getYear(r){return r._date?r._date.getFullYear():null;}
function getMonthKey(r){return r._date?r._date.getFullYear()+'-'+String(r._date.getMonth()+1).padStart(2,'0'):null;}
function getMonthLabel(k){const[y,m]=k.split('-');return MES[+m-1]+' '+y.slice(2);}

function normalizeNB(raw){
  const r=(raw||'').toString().toLowerCase().trim();
  if(!r||r==='na'||r==='sin información'||r==='sin informacion'||r===''||r==='-') return null;
  // Detectar por número al inicio del string
  const num=parseInt(r);
  if(!isNaN(num)&&num>=1&&num<=9){
    const map={1:{pot:2,des:0},2:{pot:1,des:0},3:{pot:2,des:1},4:{pot:0,des:0},5:{pot:1,des:1},6:{pot:2,des:2},7:{pot:0,des:1},8:{pot:1,des:2},9:{pot:0,des:2}};
    return map[num]||null;
  }
  // Detectar por nombre
  if(r.includes('low performer')) return{pot:2,des:0};
  if(r.includes('talento sólido')||r.includes('talento solido')) return{pot:1,des:1};
  if(r.includes('top talent')&&r.includes('competencia')) return{pot:0,des:1};
  if(r.includes('top talent')&&r.includes('desempeño')) return{pot:1,des:2};
  if(r.includes('top talent')) return{pot:0,des:2};
  if(r.includes('talento emergente')&&r.includes('competencia')) return{pot:0,des:0};
  if(r.includes('talento emergente')&&r.includes('desempeño')) return{pot:2,des:2};
  if(r.includes('requiere mejora')&&r.includes('desempeño')) return{pot:1,des:0};
  if(r.includes('requiere mejora')&&r.includes('competencia')) return{pot:2,des:1};
  if(r.includes('requiere mejora')) return{pot:2,des:0};
  return null;
}

function initFilters(){
  const anio=document.getElementById('f-anio').value;
  const dirsExtraExcluir=anio&&DIRS_POR_AÑO[anio]?DIRS_POR_AÑO[anio]:[];
  const years=[...new Set(DATA.map(r=>r._date?r._date.getFullYear():null).filter(Boolean))].filter(y=>!AÑOS_EXCLUIDOS.includes(y)).sort();
  const tipos=[...new Set(DATA.map(r=>r.tipo).filter(Boolean))].sort();
  const dirs=[...new Set(DATA
    .filter(r=>!anio||getYear(r)==+anio)
    .map(r=>r.dir).filter(d=>d&&!dirsExtraExcluir.includes(d)))].sort();
  const niveles=[...new Set(DATA.map(r=>r.nivel).filter(Boolean))].sort();
  function fill(id,vals,keep){
    const el=document.getElementById(id);
    const prev=keep?el.value:'';
    el.innerHTML=el.options[0].outerHTML;
    vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o);});
    if(prev&&[...el.options].some(o=>o.value===prev))el.value=prev;
  }
  fill('f-anio',years,true);
  fill('f-tipo',tipos,true);
  fill('f-dir',dirs,false);
  fill('f-nivel',niveles,true);
}

function getFiltered(){
  const anio=document.getElementById('f-anio').value;
  const tipo=document.getElementById('f-tipo').value;
  const dir=document.getElementById('f-dir').value;
  const nivel=document.getElementById('f-nivel').value;
  const dirsExtraExcluir=anio&&DIRS_POR_AÑO[anio]?DIRS_POR_AÑO[anio]:[];
  return DATA.filter(r=>{
    if(anio&&getYear(r)!=+anio)return false;
    if(tipo&&r.tipo!==tipo)return false;
    if(dir&&r.dir!==dir)return false;
    if(nivel&&r.nivel!==nivel)return false;
    if(dirsExtraExcluir.includes(r.dir))return false;
    return true;
  });
}

function activarDetalle(label, filterFn, snapData){
  detalleFilter={label,fn:filterFn};
  paginaActual=1;busqueda='';
  const sInput=document.querySelector('.detalle-search');
  if(sInput)sInput.value='';
  const badge=document.getElementById('detalle-filtro-badge');
  if(badge){badge.textContent='📌 '+label;badge.classList.add('visible');}
  const btnL=document.getElementById('btn-limpiar');
  if(btnL)btnL.style.display='inline-block';
  const base=snapData||getFiltered();
  const resultado=base.filter(filterFn);
  renderConFiltro(resultado);
  const dc=document.getElementById('detalle-card');
  if(dc)setTimeout(()=>dc.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function limpiarDetalle(){
  detalleFilter=null;paginaActual=1;busqueda='';
  const sInput=document.querySelector('.detalle-search');
  if(sInput)sInput.value='';
  const badge=document.getElementById('detalle-filtro-badge');
  if(badge){badge.textContent='';badge.classList.remove('visible');}
  const btnL=document.getElementById('btn-limpiar');
  if(btnL)btnL.style.display='none';
  renderConFiltro(getFiltered());
}

function getDetalleData(){
  const base=getFiltered();
  return detalleFilter?base.filter(detalleFilter.fn):base;
}
function buscar(val){busqueda=val.toLowerCase();paginaActual=1;renderTabla(getDetalleData());}
function cambiarPagina(dir){
  const filtered=getDetalleData().filter(r=>!busqueda||r.nombre.toLowerCase().includes(busqueda));
  const totalPags=Math.max(1,Math.ceil(filtered.length/porPagina));
  paginaActual=Math.max(1,Math.min(paginaActual+dir,totalPags));
  renderTabla(getDetalleData());
}

function renderTabla(data){
  if(!document.getElementById('tabla-body'))return;
  const filtrados=data.filter(r=>!busqueda||r.nombre.toLowerCase().includes(busqueda));
  const total=filtrados.length;
  const totalPags=Math.max(1,Math.ceil(total/porPagina));
  paginaActual=Math.min(paginaActual,totalPags);
  const inicio=(paginaActual-1)*porPagina;
  const pagina=filtrados.slice(inicio,inicio+porPagina);
  document.getElementById('detalle-count').textContent=total+' registros';
  document.getElementById('pag-info').textContent='Página '+paginaActual+' de '+totalPags;
  document.getElementById('btn-prev').disabled=paginaActual<=1;
  document.getElementById('btn-next').disabled=paginaActual>=totalPags;
  const tagC=t=>'tag-'+(t==='Jubilación'||t==='Jubilacion'?'Jubilación':t);
  document.getElementById('tabla-body').innerHTML=pagina.length?pagina.map(r=>`<tr>
    <td style="font-weight:500;">${r.nombre||'—'}</td>
    <td>${formatDate(r._date)}</td>
    <td><span class="tag ${tagC(r.tipo)}">${r.tipo||'—'}</span></td>
    <td>${r.dir||'—'}</td>
    <td>${r.nivel||'—'}</td>
    <td style="color:#888;font-size:11px;">${r.motivo||'—'}</td>
  </tr>`).join(''):`<tr><td colspan="6" class="empty-table">Sin registros para esta selección</td></tr>`;
}

function count(arr,key){const m={};arr.forEach(r=>{const v=r[key]||'Sin dato';m[v]=(m[v]||0)+1;});return m;}
function destroyAll(){Object.values(charts).forEach(c=>c.destroy());charts={};}

function diffYears(d1,d2){if(!d1||!d2)return null;const diff=(d2-d1)/(1000*60*60*24*365.25);return diff>=0?diff:null;}
function diffDays(d1,d2){if(!d1||!d2)return null;return Math.round((d2-d1)/(1000*60*60*24));}
function avg(arr){const v=arr.filter(x=>x!==null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}

function pct(n){return HEADCOUNT>0?(n/HEADCOUNT*100).toFixed(1)+'%':'—';}

function renderRotacion(){
  if(!document.getElementById('rot-grid'))return;
  const anioFiltro=document.getElementById('f-anio').value;
  const actualDir=document.getElementById('f-dir').value;
  const hc=actualDir&&HC_DIR[actualDir]?HC_DIR[actualDir]:HEADCOUNT;
  const label=actualDir?actualDir:'SCyF';

  function pctLocal(arr){return hc>0?(arr.length/hc*100).toFixed(1)+'%':'—';}

  function rotCol(anio, filas){
    return `<div class="rot-col">
      <div class="rot-col-title">${anio}</div>
      ${filas.map(f=>`<div class="rot-item">
        <span class="rot-item-label">${f.label}</span>
        <span class="rot-item-val ${f.color}">${f.val}</span>
      </div>`).join('')}
    </div>`;
  }

  function filasAnio(y){
    const base=DATA.filter(r=>r._date&&r._date.getFullYear()===y&&(!actualDir||r.dir===actualDir));
    return[
      {label:'Total',     val:pctLocal(base), color:'blue'},
      {label:'Voluntaria',val:pctLocal(base.filter(r=>r.tipo==='Voluntaria')), color:'green'},
      {label:'Forzada',   val:pctLocal(base.filter(r=>r.tipo==='Forzada')), color:'red'},
    ];
  }

  document.getElementById('rot-title').textContent=`% ROTACIÓN — ${label.toUpperCase()} · HC: ${hc}`;

  // Solo mostrar año filtrado o 2026 por defecto
  if(anioFiltro){
    document.getElementById('rot-grid').innerHTML=rotCol(anioFiltro, filasAnio(+anioFiltro));
  } else {
    document.getElementById('rot-grid').innerHTML=rotCol('2026', filasAnio(2026));
  }
}

function render(){
  if(!document.getElementById('c-mes'))return;
  detalleFilter=null;
  const badge=document.getElementById('detalle-filtro-badge');
  if(badge){badge.textContent='';badge.classList.remove('visible');}
  const btnL=document.getElementById('btn-limpiar');
  if(btnL)btnL.style.display='none';
  paginaActual=1;busqueda='';
  const sInput=document.querySelector('.detalle-search');
  if(sInput)sInput.value='';
  renderConFiltro(getFiltered());
}

function renderConFiltro(data){
  if(!document.getElementById('c-mes'))return;
  destroyAll();
  const n=data.length;
  const forzadas=data.filter(r=>r.tipo==='Forzada').length;
  const voluntarias=data.filter(r=>r.tipo==='Voluntaria').length;
  const jubs=data.filter(r=>r.tipo==='Jubilación'||r.tipo==='Jubilacion').length;

  document.getElementById('k-total').textContent=n;
  document.getElementById('k-rango').textContent=n+' registros';
  document.getElementById('k-vol').textContent=voluntarias;
  document.getElementById('k-pct-vol').textContent=n?Math.round(voluntarias/n*100)+'% del total':'—';
  document.getElementById('k-for').textContent=forzadas;
  document.getElementById('k-pct-for').textContent=n?Math.round(forzadas/n*100)+'% del total':'—';
  document.getElementById('k-jub').textContent=jubs;
  document.getElementById('k-pct-jub').textContent=n?Math.round(jubs/n*100)+'% del total':'—';

  // ── 9-Box (aquí primero, antes de cualquier Chart.js que pueda fallar) ──
  const nbCounts=Array.from({length:3},()=>Array(3).fill(0));let nbTotal=0;
  data.forEach(r=>{const p=normalizeNB(r.nb);if(p){nbCounts[p.pot][p.des]++;nbTotal++;}});
  document.getElementById('nb-container').innerHTML=`
    <div style="font-size:10px;color:#aaa;margin-bottom:6px;">Competencias ↑ · Desempeño → · <strong style="color:#666;">${nbTotal}</strong> de ${n} con dato 9-box</div>
    <div class="nb-wrap">
      <div class="nb-axis-y"><span>Excede</span><span>Cumple</span><span>Requiere</span></div>
      <div class="nb-right">
        <div class="nb-grid">${NB_CELLS.map(c=>{
          const cnt=nbCounts[c.pot][c.des];
          return`<div class="nb-cell" data-pot="${c.pot}" data-des="${c.des}" data-label="${c.label.replace('\n',' ')}" style="background:${c.bg};cursor:pointer;">
            <span class="nb-cell-count" style="color:${c.tc};">${cnt}</span>
            <span class="nb-cell-label" style="color:${c.tc};">${c.label.replace('\n','<br>')}</span>
          </div>`;
        }).join('')}</div>
        <div class="nb-axis-x"><span>Requiere Mejora<br><small style="font-size:8px;">0–79</small></span><span>Cumple Expectativas<br><small style="font-size:8px;">80–100</small></span><span>Excede Expectativas<br><small style="font-size:8px;">101–120</small></span></div>
      </div>
    </div>`;
  const dataSnapshot=data.slice();
  document.querySelectorAll('#nb-container .nb-cell').forEach(el=>{
    el.addEventListener('click',()=>{
      const pot=+el.dataset.pot, des=+el.dataset.des, label=el.dataset.label;
      activarDetalle('9-Box: '+label, r=>{const p=normalizeNB(r.nb);return p&&p.pot===pot&&p.des===des;}, dataSnapshot);
    });
  });

  // Rotación
  renderRotacion();

  const byMonthVol={},byMonthFor={},byMonthJub={};
  data.forEach(r=>{
    const k=getMonthKey(r);if(!k)return;
    if(r.tipo==='Voluntaria') byMonthVol[k]=(byMonthVol[k]||0)+1;
    else if(r.tipo==='Forzada') byMonthFor[k]=(byMonthFor[k]||0)+1;
    else if(r.tipo==='Jubilación'||r.tipo==='Jubilacion') byMonthJub[k]=(byMonthJub[k]||0)+1;
  });
  const allMonths=[...new Set([...Object.keys(byMonthVol),...Object.keys(byMonthFor),...Object.keys(byMonthJub)])].sort();
  const mesLabels=allMonths.map(k=>getMonthLabel(k));
  const totalPorMes=allMonths.map(k=>(byMonthVol[k]||0)+(byMonthFor[k]||0)+(byMonthJub[k]||0));
  const mesDataSnap=data.slice();

  const totalMesPlugin={id:'totalMes',afterDatasetsDraw(chart){
    const{ctx}=chart;
    const meta=chart.getDatasetMeta(chart.data.datasets.length-1);
    meta.data.forEach((bar,i)=>{
      const total=totalPorMes[i];
      if(!total)return;
      ctx.save();
      ctx.font='500 10px sans-serif';
      ctx.fillStyle='#475569';
      ctx.textAlign='center';
      ctx.textBaseline='bottom';
      ctx.fillText(total, bar.x, bar.y-2);
      ctx.restore();
    });
  }};

  charts.mes=new Chart(document.getElementById('c-mes'),{
    type:'bar',
    plugins:[totalMesPlugin],
    data:{labels:mesLabels,datasets:[
      {label:'Voluntaria', data:allMonths.map(k=>byMonthVol[k]||0), backgroundColor:'#1D9E75', borderRadius:0},
      {label:'Forzada',    data:allMonths.map(k=>byMonthFor[k]||0), backgroundColor:'#D85A30', borderRadius:0},
      {label:'Jubilación', data:allMonths.map(k=>byMonthJub[k]||0), backgroundColor:'#534AB7', borderRadius:3},
    ]},
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{padding:{top:18}},
      plugins:{
        legend:{display:true, position:'top', labels:{boxWidth:10, font:{size:10}, padding:12}},
        tooltip:{callbacks:{
          label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y}`,
          footer:items=>`Total: ${totalPorMes[items[0].dataIndex]}`
        }}
      },
      scales:{
        x:{stacked:true, ticks:{font:{size:9},maxRotation:45,autoSkip:false}},
        y:{stacked:true, ticks:{stepSize:1,font:{size:10}},beginAtZero:true}
      },
      onClick:(e,els)=>{
        if(!els.length)return;
        const idx=els[0].index;
        const dsIdx=els[0].datasetIndex;
        const monthKey=allMonths[idx];
        const tipos=['Voluntaria','Forzada','Jubilación'];
        const tipoSel=tipos[dsIdx];
        activarDetalle(getMonthLabel(monthKey)+' — '+tipoSel, r=>getMonthKey(r)===monthKey&&(r.tipo===tipoSel||(tipoSel==='Jubilación'&&r.tipo==='Jubilacion')), mesDataSnap);
      }
    }
  });

  // Dona label plugin — definido antes de usarse
  const donutLabelPlugin={id:'donutPct',afterDatasetsDraw(chart){
    const{ctx,data}=chart;
    chart.getDatasetMeta(0).data.forEach((arc,i)=>{
      const angle=(arc.startAngle+arc.endAngle)/2,r=(arc.innerRadius+arc.outerRadius)/2;
      const x=arc.x+Math.cos(angle)*r,y=arc.y+Math.sin(angle)*r;
      const val=data.datasets[0].data[i];
      if(val<8)return;
      ctx.save();ctx.font='500 11px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(Math.round(val)+'%',x,y);ctx.restore();
    });
  }};

  // Género dona
  const genMap={'Hombre':data.filter(r=>r.genero==='H').length,'Mujer':data.filter(r=>r.genero==='M').length};
  const genKeys=Object.keys(genMap).filter(k=>genMap[k]>0);
  const genColors={'Hombre':'#378ADD','Mujer':'#D85A30'};
  const genTotal=genKeys.reduce((a,k)=>a+genMap[k],0)||1;
  document.getElementById('leg-genero').innerHTML=genKeys.map(k=>`<span><span class="legend-dot" style="background:${genColors[k]}"></span>${k}: ${genMap[k]}</span>`).join('');
  charts.genero=new Chart(document.getElementById('c-genero'),{
    type:'doughnut',
    plugins:[donutLabelPlugin],
    data:{labels:genKeys,datasets:[{data:genKeys.map(k=>+(genMap[k]/genTotal*100).toFixed(1)),backgroundColor:genKeys.map(k=>genColors[k]),borderWidth:0,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${genMap[genKeys[ctx.dataIndex]]} personas`}}},
      onClick:(e,els)=>{
        if(!els.length)return;
        const g=genKeys[els[0].index]==='Hombre'?'H':'M';
        activarDetalle('Género: '+genKeys[els[0].index],r=>r.genero===g);
      }
    }
  });

  const nivelMap=count(data,'nivel'),nivelKeys=Object.keys(nivelMap).sort((a,b)=>nivelMap[b]-nivelMap[a]);
  document.getElementById('leg-nivel').innerHTML=nivelKeys.map(k=>`<span><span class="legend-dot" style="background:${COLORS[k]||'#888'}"></span>${k}</span>`).join('');
  charts.nivel=new Chart(document.getElementById('c-nivel'),{
    type:'bar',
    data:{labels:nivelKeys,datasets:[{data:nivelKeys.map(k=>nivelMap[k]),backgroundColor:nivelKeys.map(k=>COLORS[k]||'#888'),borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}},
      onClick:(e,els)=>{
        if(!els.length)return;
        const nv=nivelKeys[els[0].index];
        activarDetalle('Nivel: '+nv,r=>r.nivel===nv);
      }

  // ── Rotación por dirección ──
  if(document.getElementById('c-dir-rot')){
    const DIRS_ORDER=['Transformación y Digital','Relaciones Humanas','Administración y Finanzas','Auditoría','Fiscal','Jurídico'];
    const DIRS_SHORT={'Transformación y Digital':'TyD','Relaciones Humanas':'RH','Administración y Finanzas':'AdFin','Auditoría':'Auditoría','Fiscal':'Fiscal','Jurídico':'Jurídico'};
    const anioFiltro=document.getElementById('f-anio').value;
    const hcTotal=HEADCOUNT;
    // Siempre usar 2026 para esta gráfica cuando no hay filtro de año
    const data2026Dir=anioFiltro?data:data.filter(r=>r._date&&r._date.getFullYear()===2026);

    const bajasVolDir={},bajasForDir={};
    data2026Dir.forEach(r=>{
      if(!DIRS_ORDER.includes(r.dir))return;
      if(r.tipo==='Voluntaria') bajasVolDir[r.dir]=(bajasVolDir[r.dir]||0)+1;
      else if(r.tipo==='Forzada') bajasForDir[r.dir]=(bajasForDir[r.dir]||0)+1;

    const hcScyf=hcTotal;
    const totalVol=data2026Dir.filter(r=>r.tipo==='Voluntaria').length;
    const totalFor=data2026Dir.filter(r=>r.tipo==='Forzada').length;

    const labels=['SCyF',...DIRS_ORDER.map(d=>DIRS_SHORT[d])];
    const volData=[totalVol,...DIRS_ORDER.map(d=>bajasVolDir[d]||0)];
    const forData=[totalFor,...DIRS_ORDER.map(d=>bajasForDir[d]||0)];
    const hcArr=[hcScyf,...DIRS_ORDER.map(d=>HC_DIR[d]||1)];
    const pctVolArr=volData.map((v,i)=>+(v/hcArr[i]*100).toFixed(1));
    const pctForArr=forData.map((v,i)=>+(v/hcArr[i]*100).toFixed(1));
    const bgVol=labels.map((_,i)=>i===0?'#0A1F44':'#1D9E75');
    const bgFor=labels.map((_,i)=>i===0?'#534AB7':'#D85A30');

    document.getElementById('leg-dir-rot').innerHTML=`
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:2px;background:#1D9E75;flex-shrink:0;"></span>Voluntaria</span>
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:2px;background:#D85A30;flex-shrink:0;"></span>Forzada</span>`;

    const labelsPlugin={id:'customLabels',afterDatasetsDraw(chart){
      const{ctx}=chart;
      chart.data.datasets.forEach((ds,di)=>{
        chart.getDatasetMeta(di).data.forEach((bar,i)=>{
          const val=ds.data[i];if(!val)return;
          const barH=bar.base-bar.y;
          ctx.save();
          if(barH>18){ctx.font='500 11px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(val,bar.x,bar.y+barH/2);}
          const pct=di===0?pctVolArr[i]:pctForArr[i];
          if(pct>0){ctx.font='500 10px sans-serif';ctx.fillStyle=i===0?'#0A1F44':'#64748B';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(pct+'%',bar.x,bar.y-2);}
          ctx.restore();
        });
      });
    }};

    const bgVolFinal=labels.map(()=>'#1D9E75');
    const bgForFinal=labels.map(()=>'#D85A30');

    charts.dirRot=new Chart(document.getElementById('c-dir-rot'),{
      type:'bar',plugins:[labelsPlugin],
      data:{labels,datasets:[
        {label:'Voluntaria',data:volData,backgroundColor:bgVolFinal,borderRadius:4,borderSkipped:false},
        {label:'Forzada',   data:forData,backgroundColor:bgForFinal,borderRadius:4,borderSkipped:false},
      ]},
      options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:22}},
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y} bajas`}}},
        scales:{
          x:{stacked:false,ticks:{font:{size:11}}},
          y:{stacked:false,beginAtZero:true,ticks:{font:{size:10},stepSize:2}}
        },
        onClick:(e,els)=>{
          if(!els.length)return;
          const idx=els[0].index;
          const dsIdx=els[0].datasetIndex;
          const tipo=dsIdx===0?'Voluntaria':'Forzada';
          document.getElementById('f-tipo').value='';
          if(idx===0){
            document.getElementById('f-dir').value='';
          } else {
            const d=DIRS_ORDER[idx-1];
            document.getElementById('f-dir').value=d;
          }
          renderRotacion();render();
          // Activar detalle de tabla con dir+tipo
          const dirVal=document.getElementById('f-dir').value;
          activarDetalle((dirVal||'SCyF')+' — '+tipo, r=>r.tipo===tipo&&(!dirVal||r.dir===dirVal));
        }
      }
    });
  }

  // ── Top motivos (barras) ──
  const motMap={};
  data.forEach(r=>{const m=(r.motivo||'').trim();if(m&&m!=='NA'&&m!=='Sin información'&&m!==''){motMap[m]=(motMap[m]||0)+1;}});
  const topMot=Object.entries(motMap).sort((a,b)=>b[1]-a[1]).slice(0,8),maxMot=topMot[0]?topMot[0][1]:1;
  if(document.getElementById('motivo-list')){
    document.getElementById('motivo-list').innerHTML=topMot.map(([k,v])=>`
      <div class="bar-row" data-motivo="${k.replace(/"/g,'&quot;')}" style="cursor:pointer;">
        <span class="bar-name" title="${k}">${k}</span>

    document.querySelectorAll('#motivo-list .bar-row').forEach(el=>{
      el.addEventListener('click',()=>{const m=el.dataset.motivo;activarDetalle('Motivo: '+m,r=>r.motivo===m);});

  // ── Donas de motivos voluntarias y forzadas ──

  if(document.getElementById('c-mot-vol')){
    const volMotMap={};
    data.filter(r=>r.tipo==='Voluntaria').forEach(r=>{const m=(r.motivo||'').trim();if(m&&m!=='NA'&&m!==''){volMotMap[m]=(volMotMap[m]||0)+1;}});
    const totalVolMot=Object.values(volMotMap).reduce((a,b)=>a+b,0)||1;

    const volLabels=volEntries.map(([k])=>k),volPcts=volEntries.map(([,v])=>+(v/totalVolMot*100).toFixed(1));
    const volPers=volEntries.map(([,v])=>v);
    const colVol=['#534AB7','#1D9E75','#D85A30','#BA7517'];
    document.getElementById('leg-mot-vol').innerHTML=volLabels.map((k,i)=>`<span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:2px;background:${colVol[i]};flex-shrink:0;"></span>${k}</span>`).join('');

        onClick:(e,els)=>{if(!els.length)return;const m=volLabels[els[0].index];activarDetalle('Motivo vol: '+m,r=>r.tipo==='Voluntaria'&&r.motivo===m);}
      }
    });
  }

  if(document.getElementById('c-mot-for')){
    const forMotMap={};
    data.filter(r=>r.tipo==='Forzada').forEach(r=>{const m=(r.motivo||'').trim();if(m&&m!=='NA'&&m!==''){forMotMap[m]=(forMotMap[m]||0)+1;}});
    const totalForMot=Object.values(forMotMap).reduce((a,b)=>a+b,0)||1;
    const forEntries=Object.entries(forMotMap).sort((a,b)=>b[1]-a[1]).slice(0,4);
    const forLabels=forEntries.map(([k])=>k),forPcts=forEntries.map(([,v])=>+(v/totalForMot*100).toFixed(1));
    const forPers=forEntries.map(([,v])=>v);
    const colFor=['#D85A30','#BA7517','#534AB7','#1D9E75'];
    document.getElementById('leg-mot-for').innerHTML=forLabels.map((k,i)=>`<span style="display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;border-radius:2px;background:${colFor[i]};flex-shrink:0;"></span>${k}</span>`).join('');
    charts.motFor=new Chart(document.getElementById('c-mot-for'),{
      type:'doughnut',plugins:[donutLabelPlugin],
      data:{labels:forLabels,datasets:[{data:forPcts,backgroundColor:colFor,borderWidth:0,hoverOffset:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>` ${ctx.label}: ${forPers[ctx.dataIndex]} personas`}}},
        onClick:(e,els)=>{if(!els.length)return;const m=forLabels[els[0].index];activarDetalle('Motivo for: '+m,r=>r.tipo==='Forzada'&&r.motivo===m);}
      }
    });
  }



  // % Tabulador histogram
  const tabRanges=[{label:'–80%',min:0,max:80},{label:'81–100%',min:81,max:100},{label:'101–120%',min:101,max:120},{label:'+120%',min:121,max:999}];
  const tabData=data.map(r=>{
    let v=parseFloat((r.tab||'').toString().replace('%','').trim());
    if(isNaN(v)||v<=0) return null;
    if(v<=2) v=Math.round(v*100); // viene como decimal (0.75 → 75)
    return v;
  }).filter(v=>v!==null);
  if(tabData.length===0){
    document.getElementById('tab-container').innerHTML='<div style="text-align:center;padding:2rem;color:#bbb;font-size:13px;">Sin datos de % tabulador aún — se mostrará cuando agregues esta columna a tu Excel.</div>';
  } else {
    const rangeCounts=tabRanges.map(r=>tabData.filter(v=>v>=r.min&&v<=r.max).length);
    document.getElementById('tab-container').innerHTML='<div style="position:relative;width:100%;height:200px;"><canvas id="c-tab"></canvas></div>';
    charts.tab=new Chart(document.getElementById('c-tab'),{
      type:'bar',
      data:{labels:tabRanges.map(r=>r.label),datasets:[{label:'Colaboradores',data:rangeCounts,backgroundColor:['#FCEBEB','#FAEEDA','#EAF3DE','#E1F5EE','#EEEDFE'],borderColor:['#D85A30','#BA7517','#1D9E75','#085041','#534AB7'],borderWidth:1.5,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}},
        onClick:(e,els)=>{
          if(!els.length)return;
          const rng=tabRanges[els[0].index];
          activarDetalle('Tabulador: '+rng.label,r=>{let v=parseFloat((r.tab||'').toString().replace('%','').trim());if(isNaN(v)||v<=0)return false;if(v<=2)v=Math.round(v*100);return v>=rng.min&&v<=rng.max;});
        }
      }
    });
  }

  // Gráfica comparativa por año — solo años de fecha de baja
  const años=[...new Set(DATA.map(r=>r._date?r._date.getFullYear():null).filter(Boolean))].sort();
  const coloresAños=['#534AB7','#D85A30','#1D9E75','#BA7517'];
  const compDatasets=años.map((y,i)=>({
    label:y+'',
    data:MES.map((_,mi)=>DATA.filter(r=>getYear(r)===y&&r._date&&r._date.getMonth()===mi&&(!detalleFilter||detalleFilter.fn(r))).length),
    borderColor:coloresAños[i%coloresAños.length],
    backgroundColor:coloresAños[i%coloresAños.length]+'22',
    fill:false,tension:.3,pointRadius:3,borderWidth:2,pointHoverRadius:5
  }));
  document.getElementById('leg-comp').innerHTML=años.map((y,i)=>`<span><span class="legend-dot" style="background:${coloresAños[i%coloresAños.length]}"></span>${y}</span>`).join('');
  charts.comp=new Chart(document.getElementById('c-comp'),{
    type:'line',
    data:{labels:MES,datasets:compDatasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}},
      onClick:(e,els)=>{
        if(!els.length)return;
        const y=años[els[0].datasetIndex];
        const mi=els[0].index;
        activarDetalle(y+' — '+MES[mi],r=>getYear(r)===y&&r._date&&r._date.getMonth()===mi);
      }
    }
  });

  // Antigüedad al salir
  const antigRanges=[{label:'<1 año',min:0,max:1},{label:'1–2 años',min:1,max:2},{label:'3–5 años',min:3,max:5},{label:'6–10 años',min:6,max:10},{label:'+10 años',min:11,max:999}];
  const antigCounts=antigRanges.map(r=>data.filter(d=>{const a=diffYears(d._ingreso,d._date);return a!==null&&a>=r.min&&a<r.max+(r.max===999?0:1);}).length);
  const antigTotal=antigCounts.reduce((a,b)=>a+b,0)||1;
  const antigPcts=antigCounts.map(v=>+(v/antigTotal*100).toFixed(1));
  document.getElementById('antig-container').innerHTML='<div style="position:relative;width:100%;height:180px;"><canvas id="c-antig"></canvas></div>';
  charts.antig=new Chart(document.getElementById('c-antig'),{
    type:'bar',
    plugins:[{id:'pctLabels',afterDatasetsDraw(chart){const{ctx}=chart;chart.getDatasetMeta(0).data.forEach((bar,i)=>{const v=antigPcts[i];if(!v)return;ctx.save();ctx.font='500 10px sans-serif';ctx.fillStyle='#64748B';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(v+'%',bar.x,bar.y-2);ctx.restore();});}}],
    data:{labels:antigRanges.map(r=>r.label),datasets:[{data:antigCounts,backgroundColor:'#534AB7',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:18}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${antigCounts[ctx.dataIndex]} personas (${antigPcts[ctx.dataIndex]}%)`}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}},
      onClick:(e,els)=>{
        if(!els.length)return;
        const rng=antigRanges[els[0].index];
        activarDetalle('Antigüedad: '+rng.label,r=>{const a=diffYears(r._ingreso,r._date);return a!==null&&a>=rng.min&&a<rng.max+(rng.max===999?0:1);});
      }
    }
  });

  // Edad al salir
  const edadRanges=[{label:'<25',min:0,max:25},{label:'25–34',min:25,max:34},{label:'35–44',min:35,max:44},{label:'45–54',min:45,max:54},{label:'55+',min:55,max:999}];
  const edadCounts=edadRanges.map(r=>data.filter(d=>{const e=diffYears(d._nacimiento,d._date);return e!==null&&Math.floor(e)>=r.min&&Math.floor(e)<=r.max;}).length);
  const edadTotal=edadCounts.reduce((a,b)=>a+b,0)||1;
  const edadPcts=edadCounts.map(v=>+(v/edadTotal*100).toFixed(1));
  document.getElementById('edad-container').innerHTML='<div style="position:relative;width:100%;height:180px;"><canvas id="c-edad"></canvas></div>';
  charts.edad=new Chart(document.getElementById('c-edad'),{
    type:'bar',
    plugins:[{id:'pctLabels2',afterDatasetsDraw(chart){const{ctx}=chart;chart.getDatasetMeta(0).data.forEach((bar,i)=>{const v=edadPcts[i];if(!v)return;ctx.save();ctx.font='500 10px sans-serif';ctx.fillStyle='#64748B';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(v+'%',bar.x,bar.y-2);ctx.restore();});}}],
    data:{labels:edadRanges.map(r=>r.label),datasets:[{data:edadCounts,backgroundColor:'#1D9E75',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:18}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${edadCounts[ctx.dataIndex]} personas (${edadPcts[ctx.dataIndex]}%)`}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}},
      onClick:(e,els)=>{
        if(!els.length)return;
        const rng=edadRanges[els[0].index];
        activarDetalle('Edad: '+rng.label,r=>{const e=diffYears(r._nacimiento,r._date);return e!==null&&Math.floor(e)>=rng.min&&Math.floor(e)<=rng.max;});
      }
    }
  });

  // ── Rotación 90 días ──
  if(document.getElementById('rot90-container')){
    const rot90Snap=data.slice();
    const rot90Total=rot90Snap.filter(r=>{const d=diffDays(r._ingreso,r._date);return d!==null&&d<=90;});
    const rot90Vol=rot90Total.filter(r=>r.tipo==='Voluntaria').length;
    const rot90For=rot90Total.filter(r=>r.tipo==='Forzada').length;
    document.getElementById('rot90-container').innerHTML=`
      <div style="font-size:11px;color:#aaa;margin-bottom:4px;">Colaboradores que salieron dentro de sus primeros 90 días — haz clic para ver el detalle</div>
      <div class="rot90-grid">
        <div class="rot90-item" style="cursor:pointer;" data-rot90="total">
          <div class="rot90-val" style="color:#1a1a1a;">${rot90Total.length}</div><div class="rot90-label">Total</div>
        </div>
        <div class="rot90-item" style="cursor:pointer;" data-rot90="vol">
          <div class="rot90-val" style="color:#1D9E75;">${rot90Vol}</div><div class="rot90-label">Voluntaria</div>
        </div>
        <div class="rot90-item" style="cursor:pointer;" data-rot90="for">
          <div class="rot90-val" style="color:#D85A30;">${rot90For}</div><div class="rot90-label">Forzada</div>
        </div>
      </div>`;

    document.querySelector('[data-rot90="total"]').addEventListener('click',()=>activarDetalle('90 días: Total',r=>{const d=diffDays(r._ingreso,r._date);return d!==null&&d<=90;},rot90Snap));
    document.querySelector('[data-rot90="vol"]').addEventListener('click',()=>activarDetalle('90 días: Voluntaria',r=>{const d=diffDays(r._ingreso,r._date);return d!==null&&d<=90&&r.tipo==='Voluntaria';},rot90Snap));
    document.querySelector('[data-rot90="for"]').addEventListener('click',()=>activarDetalle('90 días: Forzada',r=>{const d=diffDays(r._ingreso,r._date);return d!==null&&d<=90&&r.tipo==='Forzada';},rot90Snap));
  }

  // ── Costo estimado eliminado ──

  // ── Riesgo de fuga por dirección ──
  if(document.getElementById('riesgo-container')){
    const DIRS_EXCLUIR_RIESGO=['Planeación Estrategica','Planeacion Estrategica'];
    const dirsExtraExcluir=document.getElementById('f-anio').value&&DIRS_POR_AÑO[document.getElementById('f-anio').value]?DIRS_POR_AÑO[document.getElementById('f-anio').value]:[];
    const DIRS_ORDER_R=['Transformación y Digital','Relaciones Humanas','Administración y Finanzas','Auditoría','Fiscal','Jurídico'].filter(d=>!dirsExtraExcluir.includes(d)&&!DIRS_EXCLUIR_RIESGO.includes(d));
    const data2026=data.filter(r=>r._date&&r._date.getFullYear()===2026);

    const riesgoData=DIRS_ORDER_R.map(d=>{
      const vols=data2026.filter(r=>r.dir===d&&r.tipo==='Voluntaria');
      const vol=vols.length;
      const p1=vols.filter(r=>r._date&&r._date.getMonth()<3).length;
      const p2=vols.filter(r=>r._date&&r._date.getMonth()>=3).length;
      const perfil=vols.filter(r=>['5','7','8','9'].includes(r.nb)).length;
      const rot90=vols.filter(r=>{const dd=diffDays(r._ingreso,r._date);return dd!==null&&dd<=90;}).length;
      const antigArr=vols.map(r=>diffYears(r._ingreso,r._date)).filter(v=>v!==null);
      const antigProm=antigArr.length?antigArr.reduce((a,b)=>a+b,0)/antigArr.length:null;
      let tendencia='—';
      if(vol>=2){tendencia=p2>p1?'↑':p2<p1?'↓':'→';}
      let score=0;
      if(vol>=2) score++;
      if(antigProm!==null&&antigProm<3) score++;
      if(perfil>=1) score++;
      if(rot90>=1) score++;
      if(tendencia==='↑') score++;
      let riesgo='Sin señal';
      if(vol===0) riesgo='Sin señal';
      else if(score>=3) riesgo='Alto';
      else if(score>=2) riesgo='Medio';
      else riesgo='Bajo';
      return{dir:d,vol,antigProm,rot90,perfil,tendencia,riesgo};
    }).sort((a,b)=>{
      const ord={'Alto':0,'Medio':1,'Bajo':2,'Sin señal':3};
      return ord[a.riesgo]-ord[b.riesgo]||b.vol-a.vol;
    });

    const maxVol=Math.max(...riesgoData.map(r=>r.vol),1);
    document.getElementById('riesgo-container').innerHTML=`
      <div style="font-size:11px;color:#aaa;margin-bottom:8px;">
        Bajas voluntarias 2026 · <strong style="color:#555;">Tendencia:</strong> ene–mar vs abr–jul ·
        <strong style="color:#555;">Riesgo:</strong> volumen, antigüedad, perfil 9box, rotación temprana y tendencia
      </div>
      <table class="riesgo-table">
        <thead><tr>
          <th>Dirección</th><th>Vol. 2026</th><th>Antigüedad prom.</th>
          <th>&lt;90 días</th><th>Perfil crítico<br><small style="font-weight:400;color:#bbb;">9box 5,7,8,9</small></th>
          <th>Tendencia</th><th>Riesgo</th>
        </tr></thead>
        <tbody>${riesgoData.map(r=>{
          const tendColor=r.tendencia==='↑'?'#DC2626':r.tendencia==='↓'?'#16A34A':r.tendencia==='→'?'#D97706':'#aaa';
          const riesgoClass=r.riesgo==='Alto'?'riesgo-alto':r.riesgo==='Medio'?'riesgo-medio':r.riesgo==='Bajo'?'riesgo-bajo':'';
          return`<tr style="cursor:pointer;">
            <td style="font-weight:500;">${r.dir}</td>
            <td>${r.vol>0?`<span style="display:inline-block;width:${Math.round(r.vol/maxVol*60)}px;height:6px;background:#534AB7;border-radius:3px;vertical-align:middle;margin-right:6px;"></span>`:''}${r.vol}</td>
            <td>${r.antigProm!==null?r.antigProm.toFixed(1)+' años':'—'}</td>
            <td>${r.rot90>0?`<span style="color:#DC2626;font-weight:600;">${r.rot90}</span>`:'0'}</td>
            <td>${r.perfil>0?`<span style="color:#534AB7;font-weight:600;">${r.perfil}</span>`:'0'}</td>
            <td style="font-size:16px;font-weight:600;color:${tendColor};">${r.tendencia}</td>
            <td>${r.riesgo!=='Sin señal'?`<span class="riesgo-badge ${riesgoClass}">${r.riesgo}</span>`:`<span style="color:#ccc;font-size:11px;">Sin señal</span>`}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;

    document.querySelectorAll('#riesgo-container tbody tr').forEach((tr,i)=>{
      tr.addEventListener('click',()=>{
        const d=riesgoData[i].dir;
        if(riesgoData[i].vol>0) activarDetalle(d+' — voluntarias 2026',r=>r.dir===d&&r.tipo==='Voluntaria'&&r._date&&r._date.getFullYear()===2026);
      });
    });
  }

  renderTabla(getDetalleData());
}



// Cargar datos automáticamente al abrir
window.addEventListener('DOMContentLoaded', ()=>{ buildCharts(); cargarDatosHardcoded(); });
</script>
