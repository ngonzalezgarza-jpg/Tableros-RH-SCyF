<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Bajas DEACERO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }

  .topbar { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #D85A30; }
  .topbar-title { font-size: 15px; font-weight: 500; color: #1a1a1a; letter-spacing: -0.01em; }
  .topbar-sub { font-size: 12px; color: #888; }
  .btn-reload { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid #e0e0da; background: #fff; cursor: pointer; color: #444; transition: background .15s; }
  .btn-reload:hover { background: #f5f5f3; }
  .btn-reload svg { width: 14px; height: 14px; }

  .main { padding: 1.5rem 2rem 3rem; max-width: 1100px; margin: 0 auto; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
  .filters label { font-size: 12px; color: #888; }
  .filters select { font-size: 12px; padding: 5px 10px; border-radius: 8px; border: 1px solid #e0e0da; background: #fff; color: #1a1a1a; cursor: pointer; }

  .kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .kpi { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: .875rem 1.125rem; }
  .kpi-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .kpi-val { font-size: 28px; font-weight: 500; color: #1a1a1a; letter-spacing: -0.02em; line-height: 1; }
  .kpi-sub { font-size: 11px; color: #aaa; margin-top: 4px; }
  .kpi-accent { border-top: 3px solid #D85A30; }
  .kpi-accent2 { border-top: 3px solid #1D9E75; }
  .kpi-accent3 { border-top: 3px solid #534AB7; }
  .kpi-accent4 { border-top: 3px solid #BA7517; }

  .charts-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-bottom: 12px; }
  .chart-card { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 1.125rem; }
  .chart-label { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .75rem; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; font-size: 11px; color: #666; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  .bar-list { display: grid; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .bar-name { color: #666; min-width: 155px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-wrap { flex: 1; background: #f0efeb; border-radius: 4px; height: 9px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; }
  .bar-count { font-size: 11px; color: #aaa; min-width: 22px; text-align: right; font-variant-numeric: tabular-nums; }

  .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem; gap: 12px; color: #aaa; }
  .state-box svg { width: 40px; height: 40px; opacity: .4; }
  .state-box p { font-size: 14px; }
  .state-box button { margin-top: 8px; font-size: 13px; padding: 8px 18px; border-radius: 8px; border: 1px solid #e0e0da; background: #fff; cursor: pointer; color: #444; }
  .state-box button:hover { background: #f5f5f3; }

  .nb-wrap { display: grid; grid-template-columns: auto 1fr; gap: 6px; }
  .nb-axis-y { display: flex; flex-direction: column; justify-content: space-around; font-size: 9px; color: #aaa; text-align: right; padding-bottom: 20px; }
  .nb-right { display: flex; flex-direction: column; gap: 3px; }
  .nb-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 52px); gap: 3px; }
  .nb-cell { border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3px; }
  .nb-cell-count { font-size: 18px; font-weight: 500; }
  .nb-cell-label { font-size: 8px; text-align: center; line-height: 1.2; opacity: .8; }
  .nb-axis-x { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
  .nb-axis-x span { font-size: 9px; color: #aaa; text-align: center; }

  .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; display: inline-block; }

  @media (max-width: 700px) {
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .main { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-dot"></div>
    <div>
      <div class="topbar-title">Dashboard Bajas DEACERO</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="last-update" style="font-size:11px;color:#aaa;"></span>
    <button class="btn-reload" onclick="cargarDatos()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Actualizar datos
    </button>
  </div>
</div>

<div class="main">
  <div class="filters">
    <label>Filtrar:</label>
    <select id="f-anio" onchange="render()"><option value="">Todos los años</option></select>
    <select id="f-tipo" onchange="render()"><option value="">Todos los tipos</option></select>
    <select id="f-dir" onchange="render()"><option value="">Todas las direcciones</option></select>
    <select id="f-nivel" onchange="render()"><option value="">Todos los niveles</option></select>
  </div>

  <div class="kpis">
    <div class="kpi kpi-accent"><div class="kpi-label">Total bajas</div><div class="kpi-val" id="k-total">—</div><div class="kpi-sub" id="k-rango">—</div></div>
    <div class="kpi kpi-accent2"><div class="kpi-label">Voluntarias</div><div class="kpi-val" id="k-vol">—</div><div class="kpi-sub" id="k-pct-vol">—</div></div>
    <div class="kpi kpi-accent"><div class="kpi-label">Forzadas</div><div class="kpi-val" id="k-for">—</div><div class="kpi-sub" id="k-pct-for">—</div></div>
    <div class="kpi kpi-accent3"><div class="kpi-label">Jubilaciones</div><div class="kpi-val" id="k-jub">—</div><div class="kpi-sub" id="k-pct-jub">—</div></div>
  </div>

  <div id="main-content">
    <div class="state-box" id="loading-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <p>Cargando datos desde SharePoint…</p>
    </div>
  </div>
</div>

<script>
const SHAREPOINT_URL = 'https://deacero0-my.sharepoint.com/:x:/r/personal/ivillalvazo_deacero_com/Documents/HRBP.xlsx?d=wc33f23d317a945ee81deedba5d34ec95&csf=1&web=1&e=NCdglN';
const DOWNLOAD_URL = SHAREPOINT_URL.replace('web=1', 'web=1').replace('?d=', '?d=').replace('&e=NCdglN', '&download=1');

const MES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const COLORS = {
  'Forzada':'#D85A30','Voluntaria':'#1D9E75','Jubilación':'#534AB7',
  'Empleado':'#378ADD','Gerente':'#D85A30','Subdirector':'#534AB7','Director':'#639922','Directora':'#639922',
};
const NB_CELLS = [
  {pot:0,des:2,label:'Alto pot.\nAlto des.',bg:'#E1F5EE',tc:'#085041'},
  {pot:0,des:1,label:'Alto pot.\nMedio des.',bg:'#EAF3DE',tc:'#27500A'},
  {pot:0,des:0,label:'Alto pot.\nBajo des.',bg:'#FAEEDA',tc:'#633806'},
  {pot:1,des:2,label:'Medio pot.\nAlto des.',bg:'#EAF3DE',tc:'#27500A'},
  {pot:1,des:1,label:'Medio pot.\nMedio des.',bg:'#FAEEDA',tc:'#633806'},
  {pot:1,des:0,label:'Medio pot.\nBajo des.',bg:'#FAECE7',tc:'#712B13'},
  {pot:2,des:2,label:'Bajo pot.\nAlto des.',bg:'#FAEEDA',tc:'#633806'},
  {pot:2,des:1,label:'Bajo pot.\nMedio des.',bg:'#FAECE7',tc:'#712B13'},
  {pot:2,des:0,label:'Bajo pot.\nBajo des.',bg:'#FCEBEB',tc:'#791F1F'},
];

let DATA = [];
let charts = {};

function excelDateToJS(serial) {
  if (typeof serial === 'number') {
    const d = new Date(Math.round((serial - 25569) * 86400 * 1000));
    return d;
  }
  if (typeof serial === 'string' && serial.includes('/')) {
    const [d,m,y] = serial.split('/');
    return new Date(+y, +m-1, +d);
  }
  return null;
}

function getYear(r) { return r._date ? r._date.getFullYear() : null; }
function getMonthKey(r) { return r._date ? r._date.getFullYear()+'-'+(r._date.getMonth()+1) : null; }

function normalizeNB(raw) {
  const r = (raw||'').toLowerCase().trim();
  if (!r || r === 'na' || r === 'sin información') return null;
  const desBajo = r.includes('bajo desempeño') || r.includes('low performer') || r.includes('desempeño') && r.includes('bajo');
  const desMedio = r.includes('medio desempeño') || r.includes('requiere mejora');
  const desAlto = r.includes('alto desempeño');
  const potAlto = r.includes('alto potencial');
  const potMedio = r.includes('medio potencial');
  const potBajo = r.includes('bajo potencial');
  if (!potAlto && !potMedio && !potBajo && !desBajo && !desMedio && !desAlto) {
    if (r.includes('productividad')) return {pot:1,des:1};
    return null;
  }
  const pot = potAlto ? 0 : potMedio ? 1 : 2;
  const des = desAlto ? 2 : desMedio ? 1 : 0;
  return {pot, des};
}

async function cargarDatos() {
  document.getElementById('loading-state') && (document.getElementById('main-content').innerHTML = `
    <div class="state-box" id="loading-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <p>Conectando con SharePoint…</p>
    </div>`);

  try {
    const resp = await fetch(DOWNLOAD_URL, { credentials: 'include', mode: 'cors' });
    if (!resp.ok) throw new Error('No se pudo descargar el archivo. Código: ' + resp.status);
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

    DATA = rows.map(r => {
      const fecha = r['Fecha de Baja'] || r['Fecha de baja'] || r['fecha'] || '';
      const dt = excelDateToJS(fecha);
      return {
        nombre: r['Nombre Completo'] || r['Nombre'] || '',
        fecha: fecha,
        _date: dt,
        tipo: (r['Tipo de Baja'] || r['Tipo de baja'] || '').trim(),
        dir: (r['Dirección'] || r['Direccion'] || '').trim(),
        nivel: (r['Nivel Organizacional'] || r['Nivel'] || '').trim(),
        motivo: (r['Motivo de baja'] || r['Motivo'] || '').trim(),
        nb: (r['9box'] || r['9Box'] || r['9-box'] || '').trim(),
        resp: (r['Responsable'] || '').trim(),
      };
    }).filter(r => r.nombre || r._date);

    initFilters();
    buildUI();
    render();
    document.getElementById('last-update').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('main-content').innerHTML = `
      <div class="state-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p style="color:#D85A30;">No se pudo acceder al archivo de SharePoint.</p>
        <p style="font-size:12px;text-align:center;max-width:380px;">Asegúrate de estar conectada a tu cuenta Microsoft en este navegador y de tener acceso al archivo.</p>
        <p style="font-size:11px;color:#bbb;">${e.message}</p>
        <button onclick="cargarDatos()">Reintentar</button>
      </div>`;
  }
}

function initFilters() {
  const years = [...new Set(DATA.map(getYear).filter(Boolean))].sort();
  const tipos = [...new Set(DATA.map(r=>r.tipo).filter(Boolean))].sort();
  const dirs = [...new Set(DATA.map(r=>r.dir).filter(Boolean))].sort();
  const niveles = [...new Set(DATA.map(r=>r.nivel).filter(Boolean))].sort();

  function fill(id, vals, cur) {
    const el = document.getElementById(id);
    const prev = el.value || cur;
    el.innerHTML = el.options[0].outerHTML;
    vals.forEach(v => { const o = document.createElement('option'); o.value=v; o.textContent=v; el.appendChild(o); });
    if (prev) el.value = prev;
  }
  fill('f-anio', years);
  fill('f-tipo', tipos);
  fill('f-dir', dirs);
  fill('f-nivel', niveles);
}

function buildUI() {
  document.getElementById('main-content').innerHTML = `
    <div class="charts-row">
      <div class="chart-card" style="grid-column:1/-1;">
        <div class="chart-label">Bajas por mes</div>
        <div style="position:relative;width:100%;height:200px;"><canvas id="c-mes" role="img" aria-label="Bajas por mes"></canvas></div>
      </div>
    </div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-label">Tipo de baja</div>
        <div id="leg-tipo" class="legend"></div>
        <div style="position:relative;width:100%;height:170px;"><canvas id="c-tipo" role="img" aria-label="Tipo de baja"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-label">Por nivel organizacional</div>
        <div id="leg-nivel" class="legend"></div>
        <div style="position:relative;width:100%;height:170px;"><canvas id="c-nivel" role="img" aria-label="Por nivel"></canvas></div>
      </div>
    </div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-label">Top direcciones</div>
        <div class="bar-list" id="dir-list"></div>
      </div>
      <div class="chart-card">
        <div class="chart-label">Top motivos de baja</div>
        <div class="bar-list" id="motivo-list"></div>
      </div>
    </div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-label">9-Box — distribución de bajas</div>
        <div id="nb-container"></div>
      </div>
      <div class="chart-card">
        <div class="chart-label">Bajas por tipo — acumulado mensual</div>
        <div id="leg-acum" class="legend"></div>
        <div style="position:relative;width:100%;height:200px;"><canvas id="c-acum" role="img" aria-label="Acumulado mensual por tipo"></canvas></div>
      </div>
    </div>`;
}

function getFiltered() {
  const anio = document.getElementById('f-anio').value;
  const tipo = document.getElementById('f-tipo').value;
  const dir = document.getElementById('f-dir').value;
  const nivel = document.getElementById('f-nivel').value;
  return DATA.filter(r => {
    if (anio && getYear(r) != +anio) return false;
    if (tipo && r.tipo !== tipo) return false;
    if (dir && r.dir !== dir) return false;
    if (nivel && r.nivel !== nivel) return false;
    return true;
  });
}

function count(arr, key) {
  const m = {};
  arr.forEach(r => { const v = r[key]||'Sin dato'; m[v]=(m[v]||0)+1; });
  return m;
}

function destroyAll() { Object.values(charts).forEach(c=>c.destroy()); charts={}; }

function render() {
  if (!document.getElementById('c-mes')) return;
  destroyAll();
  const data = getFiltered();
  const n = data.length;
  const forzadas = data.filter(r=>r.tipo==='Forzada').length;
  const voluntarias = data.filter(r=>r.tipo==='Voluntaria').length;
  const jubs = data.filter(r=>r.tipo==='Jubilación').length;

  document.getElementById('k-total').textContent = n;
  document.getElementById('k-rango').textContent = n + ' registros';
  document.getElementById('k-vol').textContent = voluntarias;
  document.getElementById('k-pct-vol').textContent = n ? Math.round(voluntarias/n*100)+'% del total' : '—';
  document.getElementById('k-for').textContent = forzadas;
  document.getElementById('k-pct-for').textContent = n ? Math.round(forzadas/n*100)+'% del total' : '—';
  document.getElementById('k-jub').textContent = jubs;
  document.getElementById('k-pct-jub').textContent = n ? Math.round(jubs/n*100)+'% del total' : '—';

  const byMonth = {};
  data.forEach(r => { const k=getMonthKey(r); if(k){byMonth[k]=(byMonth[k]||0)+1;} });
  const sortedMonths = Object.keys(byMonth).sort();
  const mesLabels = sortedMonths.map(k => { const[y,m]=k.split('-'); return MES[+m-1]+' '+y.slice(2); });
  charts.mes = new Chart(document.getElementById('c-mes'), {
    type:'bar',
    data:{labels:mesLabels,datasets:[{label:'Bajas',data:sortedMonths.map(k=>byMonth[k]),backgroundColor:'#534AB7',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:45,autoSkip:false}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}}}
  });

  const tipoMap = count(data,'tipo');
  const tipoKeys = Object.keys(tipoMap);
  document.getElementById('leg-tipo').innerHTML = tipoKeys.map(k=>`<span><span class="legend-dot" style="background:${COLORS[k]||'#888'}"></span>${k}: ${tipoMap[k]}</span>`).join('');
  charts.tipo = new Chart(document.getElementById('c-tipo'), {
    type:'doughnut',
    data:{labels:tipoKeys,datasets:[{data:tipoKeys.map(k=>tipoMap[k]),backgroundColor:tipoKeys.map(k=>COLORS[k]||'#888'),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
  });

  const nivelMap = count(data,'nivel');
  const nivelKeys = Object.keys(nivelMap).sort((a,b)=>nivelMap[b]-nivelMap[a]);
  document.getElementById('leg-nivel').innerHTML = nivelKeys.map(k=>`<span><span class="legend-dot" style="background:${COLORS[k]||'#888'}"></span>${k}</span>`).join('');
  charts.nivel = new Chart(document.getElementById('c-nivel'), {
    type:'bar',
    data:{labels:nivelKeys,datasets:[{data:nivelKeys.map(k=>nivelMap[k]),backgroundColor:nivelKeys.map(k=>COLORS[k]||'#888'),borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}}}
  });

  const dirMap = count(data,'dir');
  const topDirs = Object.entries(dirMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxDir = topDirs[0]?topDirs[0][1]:1;
  document.getElementById('dir-list').innerHTML = topDirs.map(([k,v])=>`
    <div class="bar-row">
      <span class="bar-name" title="${k}">${k}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxDir*100)}%;background:#534AB7;"></div></div>
      <span class="bar-count">${v}</span>
    </div>`).join('');

  const motMap = {};
  data.forEach(r => { const m=(r.motivo||'').trim(); if(m&&m!=='NA'&&m!=='Sin información'&&m!=='') { motMap[m]=(motMap[m]||0)+1; } });
  const topMot = Object.entries(motMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxMot = topMot[0]?topMot[0][1]:1;
  document.getElementById('motivo-list').innerHTML = topMot.map(([k,v])=>`
    <div class="bar-row">
      <span class="bar-name" title="${k}">${k}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxMot*100)}%;background:#1D9E75;"></div></div>
      <span class="bar-count">${v}</span>
    </div>`).join('');

  const nbCounts = Array.from({length:3},()=>Array(3).fill(0));
  let nbTotal = 0;
  data.forEach(r => { const p=normalizeNB(r.nb); if(p){nbCounts[p.pot][p.des]++;nbTotal++;} });
  document.getElementById('nb-container').innerHTML = `
    <div style="font-size:10px;color:#aaa;margin-bottom:6px;">Potencial ↑ · Desempeño → · <strong style="color:#666;">${nbTotal}</strong> de ${n} con dato 9-box</div>
    <div class="nb-wrap">
      <div class="nb-axis-y"><span>Alto</span><span>Medio</span><span>Bajo</span></div>
      <div class="nb-right">
        <div class="nb-grid">
          ${NB_CELLS.map(c=>`<div class="nb-cell" style="background:${c.bg};">
            <span class="nb-cell-count" style="color:${c.tc};">${nbCounts[c.pot][c.des]}</span>
            <span class="nb-cell-label" style="color:${c.tc};">${c.label.replace('\n','<br>')}</span>
          </div>`).join('')}
        </div>
        <div class="nb-axis-x"><span>Bajo</span><span>Medio</span><span>Alto</span></div>
      </div>
    </div>`;

  const tiposAcum = ['Forzada','Voluntaria','Jubilación'];
  const coloresAcum = ['#D85A30','#1D9E75','#534AB7'];
  const acumDatasets = tiposAcum.map((t,i) => {
    const counts = sortedMonths.map(k => data.filter(r=>r.tipo===t&&getMonthKey(r)===k).length);
    return { label:t, data:counts, borderColor:coloresAcum[i], backgroundColor:coloresAcum[i]+'22', fill:false, tension:.3, pointRadius:3, borderWidth:2 };
  });
  document.getElementById('leg-acum').innerHTML = tiposAcum.map((t,i)=>`<span><span class="legend-dot" style="background:${coloresAcum[i]}"></span>${t}</span>`).join('');
  charts.acum = new Chart(document.getElementById('c-acum'), {
    type:'line',
    data:{labels:mesLabels,datasets:acumDatasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},maxRotation:45,autoSkip:false}},y:{ticks:{stepSize:1,font:{size:10}},beginAtZero:true}}}
  });
}

cargarDatos();
</script>
